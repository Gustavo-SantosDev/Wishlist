<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/recover.css">
    <title>Recuperacao de senha</title>
</head>
<body>
    <div class="box-recover">
        <form action="">
            <h4>Ensira o email para que possa receber o link de recuperacao</h4>
            <label for="user-email">Email:</label>
            <input type="email" name="email" id="user-email" placeholder="Email">

            <label for="user-date">Data</label>
            <input type="date" name="date" id="user-date">

            <div class="auth-btn">
                <a href="#" class="btn btn-send">Enviar</a>
                <a href="../index.html" class="btn btn-back">Voltar</a>
            </div>
        </form>
    </div>
</body>
</html>
