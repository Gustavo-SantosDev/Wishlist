<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/register.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="box-register">
        <form action="">
            <h1>Cadastro</h1>
            <label for="user-name">Nome:</label>
            <input type="text" id="user-name" name="Name" placeholder="Nome">

            <label for="user-date">Data de nascimento</label>
            <input type="date" name="" id="user-date" name="datebirth">

            <label for="user-email">Email:</label>
            <input type="email" id="user-email" name="email" placeholder="Email">

            <label for="user-password">Senha:</label>
            <input type="password" id="user-password" name="password" placeholder="Senha">

            <label for="confirm-passwowrd">Confirmar Senha:</label>
            <input type="password" id="confirm-passwowrd" name="confirm_password" placeholder="Confirmar senha">

            <div class="auth-btns">
                <a href="#" class="btn btn-confirm">Confirmar</a>
                <a href="../index.html" class="btn btn-back">Voltar</a>
            </div>
        </form>
    </div>
</body>
</html>
